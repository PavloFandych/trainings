services:
  hibernate-postgres:
    image: postgres
    container_name: hibernate-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: root
    volumes:
      - postgres-data:/var/lib/postgresql

  example-redis:
    image: redis
    container_name: example-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
